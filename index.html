<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Stylish Font Generator</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #161820;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --text-muted: #8a8f98;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.1);
            border: 1px solid rgba(0, 255, 204, 0.1);
        }
        h1 {
            color: var(--accent-color);
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            border: 2px solid #2a2d3d;
            border-radius: 12px;
            background-color: #1f222e;
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }
        input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .result-box {
            margin-top: 25px;
            text-align: left;
        }
        .font-item {
            background: #1f222e;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent-color);
            transition: 0.2s;
        }
        .font-item:hover {
            transform: translateX(3px);
            background: #252937;
        }
        .font-text {
            font-size: 20px;
            word-break: break-all;
            padding-right: 10px;
        }
        .copy-btn {
            background: var(--accent-color);
            color: #0d0e12;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .copy-btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }
        .copy-btn.copied {
            background: #2ecc71;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>VIP Font Generator</h1>
    <p>Type your text below and click any font to copy instantly!</p>
    
    <input type="text" id="userInput" placeholder="Yahan apna naam likhein..." oninput="generateFonts()">
    
    <div class="result-box" id="resultBox">
        <!-- Fonts yahan auto generate honge -->
    </div>
</div>

        { name: "Double Struck (Outline)", map: { 'a': '𝕒', 'b': '𝕓', 'c': '𝕔', 'd': '𝕕', 'e': '𝕖', 'f': '𝕗', 'g': '𝕘', 'h': '𝕙', 'i': '𝕚', 'j': '𝕛', 'k': '𝕜', 'l': '𝕝', 'm': '𝕞', 'n': '𝕟', 'o': '𝕠', 'p': '𝕡', 'q': '𝕢', 'r': '𝕣', 's': '𝕤', 't': '𝕥', 'u': '𝕦', 'v': '𝕧', 'w': '𝕨', 'x': '𝕩', 'y': '𝕪', 'z': '𝕫', 'A': '𝔸', 'B': '𝔹', 'C': 'ℂ', 'D': '𝔻', 'E': '𝔼', 'F': '𝔽', 'G': '𝔾', 'H': 'ℍ', 'I': '𝕀', 'J': '𝕁', 'K': '𝕂', 'L': '𝕃', 'M': '𝕄', 'N': 'ℕ', 'O': '𝕆', 'P': 'ℙ', 'Q': 'ℚ', 'R': 'ℝ', 'S': '𝕊', 'T': '𝕋', 'U': '𝕌', 'V': '𝕍', 'W': '𝕎', 'X': '𝕏', 'Y': '𝕐', 'Z': 'ℤ' } },

        { name: "Italic Bold", map: { 'a': '𝘌', 'b': '𝘣', 'c': '𝘤', 'd': '𝘥', 'e': '𝘦', 'f': '𝘧', 'g': '𝘨', 'h': '𝘩', 'i': '𝘪', 'j': '𝘫', 'k': '𝘬', 'l': '𝘭', 'm': '𝘮', 'n': '𝘯', 'o': '𝘰', 'p': '𝘱', 'q': '𝘲', 'r': '𝘳', 's': '𝘴', 't': '𝘵', 'u': '𝘶', 'v': '𝘷', 'w': '𝘸', 'x': '𝘹', 'y': '𝘺', 'z': '𝘻', 'A': '𝘈', 'B': '𝘉', 'C': '𝘊', 'D': '𝘋', 'E': '𝘌', 'F': '𝘍', 'G': '𝘎', 'H': '𝘏', 'I': '𝘐', 'J': '𝘑', 'K': '𝘒', 'L': '𝘓', 'M': '𝘔', 'N': '𝘕', 'O': '𝘖', 'P': '𝘗', 'Q': '𝘘', 'R': '𝘙', 'S': '𝘚', 'T': '𝘛', 'U': '𝘜', 'V': '𝘝', 'W': '𝘞', 'X': '𝘟', 'Y': '𝘠', 'Z': '𝘡' } },
        { name: "Monospace", map: { 'a': '𝚊', 'b': '𝚋', 'c': '𝚌', 'd': '𝚍', 'e': '𝚎', 'f': '𝚏', 'g': '𝚐', 'h': '𝚑', 'i': '𝚒', 'j': '𝚓', 'k': '𝚔', 'l': '𝚕', 'm': '𝚖', 'n': '𝚗', 'o': '𝚘', 'p': '𝚙', 'q': '𝚚', 'r': '𝚛', 's': '𝚜', 't': '𝚝', 'u': '𝚞', 'v': '𝚟', 'w': '𝚠', 'x': '𝚡', 'y': '𝚢', 'z': '𝚣', 'A': '𝙰', 'B': '𝙱', 'C': '𝙲', 'D': '𝙳', 'E': '𝙴', 'F': '𝙵', 'G': '𝙶', 'H': '𝙷', 'I': '𝙸', 'J': '𝚙', 'K': '𝙺', 'L': '𝙻', 'M': '𝙼', 'N': '𝙽', 'O': '𝙾', 'P': '𝙿', 'Q': '𝚀', 'R': '𝚁', 'S': '𝚂', 'T': '𝚃', 'U': '𝚄', 'V': '𝚅', 'W': '𝚆', 'X': '𝚇', 'Y': '𝚈', 'Z': '𝚉' } },
        { name: "Japanese Style", map: { 'a': '卂', 'b': '乃', 'c': '匚', 'd': '刀', 'e': '乇', 'f': '千', 'g': 'Ꮆ', 'h': '卄', 'i': '丨', 'j': 'ﾌ', 'k': 'Ҝ', 'l': 'ㄥ', 'm': '爪', 'n': '几', 'o': 'ㄖ', 'p': '卩', 'q': 'Ɋ', 'r': '尺', 's': '丂', 't': 'ㄒ', 'u': 'ㄩ', 'v': 'ᐪ', 'w': '山', 'x': '乂', 'y': 'ㄚ', 'z': '乙' } },
        { name: "Underline Style", decoration: text => text.split('').join('̲') + '̲' },
        { name: "Strikethrough Style", decoration: text => text.split('').join('̶') + '̶' },
        { name: "Bubble Style", map: { 'a': 'ⓐ', 'b': 'ⓑ', 'c': 'ⓒ', 'd': 'ⓓ', 'e': 'ⓔ', 'f': 'ⓕ', 'g': 'ⓖ', 'h': 'ⓗ', 'i': 'ⓘ', 'j': 'ⓙ', 'k': 'ⓚ', 'l': 'ⓛ', 'm': 'ⓜ', 'n': 'ⓝ', 'o': 'ⓞ', 'p': 'ⓟ', 'q': 'ⓠ', 'r': 'ⓡ', 's': 'ⓢ', 't': 'ⓣ', 'u': 'ⓤ', 'v': 'ⓥ', 'w': 'ⓦ', 'x': 'ⓧ', 'y': 'ⓨ', 'z': 'ⓩ' } },
        { name: "Square Style", map: { 'a': '🄰', 'b': '🄱', 'c': '🄲', 'd': '🄳', 'e': '🄴', 'f': '🄵', 'g': '🄶', 'h': '🄷', 'i': '🄸', 'j': '🄹', 'k': '🄺', 'l': '🄻', 'm': '🄼', 'n': '🄽', 'o': '🄾', 'p': '🄿', 'q': '🅀', 'r': '🅁', 's': '🅂', 't': '🅃', 'u': '🅄', 'v': '🅅', 'w': '🅆', 'x': '🅇', 'y': '🅈', 'z': '🅉' } },
        { name: "Heart Decor", decoration: text => `❤️ ${text} ❤️` },
        { name: "Star Decor", decoration: text => `✨ 彡 [${text}] 彡 ✨` },
        { name: "King Decor", decoration: text => `👑 ${text} 👑` }
    ];

    function convertText(text, fontMap) {
        if (fontMap.decoration) return fontMap.decoration(text);
        return text.split('').map(char => fontMap.map[char] || fontMap.map[char.toLowerCase()] || char).join('');
    }

    function generateFonts() {
        const input = document.getElementById('userInput').value;
        const resultBox = document.getElementById('resultBox');
        resultBox.innerHTML = '';

        if (!input) return;

        fontMaps.forEach((font, index) => {
            const transformed = convertText(input, font);
            
            const item = document.createElement('div');
            item.className = 'font-item';
            
            const textSpan = document.createElement('span');
            textSpan.className = 'font-text';
            textSpan.id = `font-${index}`;
            textSpan.innerText = transformed;
            
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.innerText = 'Copy 📋';
            btn.onclick = () => copyToClipboard(`font-${index}`, btn);
            
            item.appendChild(textSpan);
            item.appendChild(btn);
            resultBox.appendChild(item);
        });
    }

    function copyToClipboard(id, button) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            button.innerText = 'Copied! ✅';
            button.classList.add('copied');
            setTimeout(() => {
                button.innerText = 'Copy 📋';
                button.classList.remove('copied');
            }, 2000);
        });
    }
</script>

</body>
</html>

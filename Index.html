<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Font Generator for Instagram & TikTok</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            background: #1e1e1e;
            margin: 0 auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #ff007f;
            font-size: 24px;
            margin-bottom: 5px;
        }
        p {
            color: #aaa;
            font-size: 14px;
            margin-top: 0;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 2px solid #ff007f;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }
        .result-box {
            margin-top: 15px;
            text-align: left;
        }
        .font-item {
            background: #2a2a2a;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #00f2fe;
        }
        .font-text {
            font-size: 18px;
            word-break: break-all;
        }
        .copy-btn {
            background: #ff007f;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .copy-btn:active {
            background: #00f2fe;
        }
        .ad-space {
            margin: 20px 0;
            padding: 15px;
            background: #252525;
            border: 1px dashed #555;
            color: #777;
            font-size: 12px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ Cool Font Generator ✨</h1>
    <p>Type your name and copy stylish fonts for Bio</p>
    
    <input type="text" id="userInput" placeholder="Yahan apna naam likhein..." oninput="generateFonts()">
    
    <!-- ADVERTISEMENT SPACE -->
    <div class="ad-space">
        [Google AdSense / Adsterra Advertisement Area]
    </div>

    <div class="result-box" id="output">
        <!-- Fonts yahan load honge -->
    </div>
</div>

<script>
    // Kuch stylish alphabets ki mappings
    const styles = {
        style1: { 'a': '𝔲', 'b': '𝔟', 'c': '𝔠', 'd': '𝔡', 'e': '𝔢', 'f': '𝔣', 'g': '𝔤', 'h': '𝔥', 'i': '𝔦', 'j': '𝔧', 'k': '𝔨', 'l': '𝔩', 'm': '𝔪', 'n': '𝔫', 'o': '𝔬', 'p': '𝔭', 'q': '𝔮', 'r': '𝔯', 's': '𝔰', 't': '𝔱', 'u': '𝔲', 'v': '𝔳', 'w': '𝔴', 'x': '𝔵', 'y': '𝔶', 'z': '𝔷' },
        style2: { 'a': '𝓪', 'b': '𝓫', 'c': '𝓬', 'd': '𝓭', 'e': '𝓮', 'f': '𝓯', 'g': '𝓰', 'h': '𝓱', 'i': '𝓲', 'j': '𝓳', 'k': '𝓴', 'l': '𝓵', 'm': '𝓶', 'n': '𝓷', 'o': '𝓸', 'p': '𝓹', 'q': '𝓿', 'r': '𝓻', 's': '𝓼', 't': '𝓽', 'u': '𝓾', 'v': '𝓿', 'w': '𝔀', 'x': '𝔁', 'y': '𝔂', 'z': '𝔃' },
        style3: { 'a': '𝕒', 'b': '𝕓', 'c': '𝕔', 'd': '𝕕', 'e': '𝕖', 'f': '𝕗', 'g': '𝕘', 'h': '𝕙', 'i': '𝕚', 'j': '𝕛', 'k': '𝕜', 'l': '𝕝', 'm': '𝕞', 'n': '𝕟', 'o': '𝕠', 'p': '𝕡', 'q': '𝕢', 'r': '𝕣', 's': '𝕤', 't': '𝕥', 'u': '𝕦', 'v': '𝕧', 'w': '𝕨', 'x': '𝕩', 'y': '𝕪', 'z': '𝕫' },
        style4: { 'a': '₳', 'b': '฿', 'c': '₵', 'd': 'Đ', 'e': 'Ɇ', 'f': '₣', 'g': '₲', 'h': 'Ⱨ', 'i': 'ł', 'j': ' J', 'k': '₭', 'l': 'Ⱡ', 'm': '₥', 'n': '₦', 'o': 'Ø', 'p': '₱', 'q': '☥', 'r': 'Ɽ', 's': '₴', 't': '₮', 'u': 'Ʉ', 'v': 'V', 'w': '₩', 'x': ' andando', 'y': '¥', 'z': 'Ƶ' }
    };

    function convertText(text, map) {
        return text.toLowerCase().split('').map(char => map[char] || char).join('');
    }

    function generateFonts() {
        const input = document.getElementById('userInput').value;
        const output = document.getElementById('output');
        
        if(input.trim() === "") {
            output.innerHTML = "";
            return;
        }

        let html = "";
        
        // Alag alag designs text ke sath decoration lagana
        const variations = [
            convertText(input, styles.style1),
            convertText(input, styles.style2),
            convertText(input, styles.style3),
            "✨ " + convertText(input, styles.style2) + " ✨",
            "⚡️ " + convertText(input, styles.style4) + " ⚡️",
            "👑 " + convertText(input, styles.style1) + " 👑",
            "꧁༺ " + input + " ༻꧂"
        ];

        variations.forEach((font, index) => {
            html += `
                <div class="font-item">
                    <span class="font-text" id="text-${index}">${font}</span>
                    <button class="copy-btn" onclick="copyToClipboard('text-${index}', this)">Copy</button>
                </div>
            `;
        });

        output.innerHTML = html;
    }

    function copyToClipboard(elementId, btn) {
        const text = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(text).then(() => {
            btn.innerText = "Copied!";
            btn.style.background = "#00f2fe";
            setTimeout(() => {
                btn.innerText = "Copy";
                btn.style.background = "#ff007f";
            }, 1500);
        });
    }
</script>

</body>
</html>
